name: pipeline ci/cd

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: node-version: [20,24]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version}}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: instalar dependencias
        run: npm ci
      - name: rodar testes
        run: npm test
