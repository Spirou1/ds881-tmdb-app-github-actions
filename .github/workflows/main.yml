
name: pipeline ci/cd

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: teste etapa 1
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: instalar dependencias
        run: npm ci
      - name: rodar testes
        run: npm test